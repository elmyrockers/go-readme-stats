name: Generate Stats

on:
  workflow_dispatch:   # manual trigger (for testing)
  schedule:
    - cron: "0 0 * * *"   # daily at 8AM Malaysia (UTC midnight)

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'   # uses Go 1.25
          cache: true                # cache dependencies (faster)

      - name: Verify dependencies
        run: |
          go mod tidy
          git restore go.mod go.sum

      - name: Generate SVG stats
        run: go run .
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Commit Generated SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add *.svg

          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")

          git commit -m "Auto: Update SVG stats at $TIMESTAMP" || \
          git commit --allow-empty -m "Auto: Daily stats run at $TIMESTAMP"

          git push